name: auto-finetune

# ── Data sources ────────────────────────────────────────────────────────────
sources:
  opencode:
    # Live/current opencode session store on SSD.
    db_path: /media/scott/SSD_4TB/opencode/opencode.db
    # Older / broken snapshots on NAS5. Each gets its own checkpoint.
    extra_dbs:
      - path: /media/scott/NAS5/fileserver/opencode/opencode.db
        enabled: true
        label: nas5-main
      - path: /media/scott/NAS5/fileserver/opencode/opencode_20260717.db
        enabled: true
        label: nas5-20260717
      - path: /media/scott/NAS5/fileserver/opencode/opencode_old_broken.db
        enabled: true
        label: nas5-old-broken
      - path: /media/scott/NAS5/fileserver/opencode_recover_old.db
        enabled: true
        label: nas5-recover-old
  hermes:
    # Hermes canonical session store is the SQLite state.db (system of record),
    # optionally enriched from the live Neo4j knowledge graph. Handled by a
    # dedicated extractor (src/extract_hermes.py), not a JSON export dir.
    state_db: /media/scott/SSD_4TB/hermes-home/.hermes/state.db
    # Optional Neo4j enrichment for sessions/nodes not yet in state.db.
    neo4j:
      enabled: false
      uri: bolt://100.64.43.123:7687
      user: neo4j
    enabled: true

# ── Extraction ──────────────────────────────────────────────────────────────
extract:
  # Only keep sessions whose title/agent matches these (empty = keep all).
  include_agents: []
  exclude_agents: []
  min_messages: 2
  # Skip rows whose underlying DB page is unreadable (corruption).
  skip_corrupt_rows: true

# ── Cleaning ────────────────────────────────────────────────────────────────
clean:
  # Redact secrets / tokens found in tool inputs & outputs.
  redact_secrets: true
  # Drop assistant turns that contain no text and no tool calls.
  drop_empty_turns: true
  # Max characters per message; longer are truncated (0 = unlimited).
  max_chars_per_message: 32000
  # Remove reasoning parts from training targets (keep as context optionally).
  keep_reasoning_as_context: false
  # Deduplicate identical conversations.
  dedupe: true

# ── Dataset formatting ──────────────────────────────────────────────────────
format:
  # chatml | alpaca | sharegpt | hermes (uses tokenizer chat_template)
  template: hermes
  # Empty = use tokenizer's default system prompt (includes tool definitions)
  system_prompt: ""
  # Split long multi-session histories into windows of N turns for training.
  max_turns_per_example: 0   # 0 = use whole conversation
  # Character budget per example. Sessions longer than this are split into
  # sliding windows so each fits max_seq_length. ~24k chars ~ 8k tokens.
  max_chars_per_example: 24000

# ── Training ────────────────────────────────────────────────────────────────
# backend: auto | unsloth | peft
#   unsloth  -> CUDA only, fastest. Requires `pip install unsloth` on a CUDA box.
#   peft     -> ROCm (AMD) AND CUDA. Uses HuggingFace PEFT + bitsandbytes (4-bit)
#               or GPTQ. This is what you want on AMD GPUs.
#   auto     -> use unsloth if a CUDA GPU + unsloth is present, else peft.
train:
  # This host is AMD (Ryzen AI 9 HX 370 / Radeon 890M) -> ROCm/peft backend.
  backend: peft
  # Base model to finetune. For AMD/ROCm + peft use a standard HF model id.
  # RefinedToolCallV5-3b is already finetuned on Hermes agent reasoning traces
  # with tool calling (qwen2 architecture, 3B params, 131K context).
  model_name: /media/scott/SSD_4TB/models-fast/RefinedNeuro/RefinedToolCallV5-3b
  # LoRA / QLoRA settings (adjusted for 3B continued finetune)
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  # Explicit target modules for Qwen2 architecture
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  max_seq_length: 8192
  gradient_checkpointing: true
  # 4-bit quantization for fitting large models on modest GPUs.
  # peft backend uses bitsandbytes (CUDA) or auto-gptq (ROCm) under the hood.
  # NOTE: bitsandbytes has NO ROCm binary installed here (libbitsandbytes_rocm83.so
  # missing) — keep this false or the run crashes at model load on AMD/ROCm.
  load_in_4bit: false
  # Optimizer / schedule
  learning_rate: 1e-4
  num_train_epochs: 2
  # 890M iGPU (gfx1151) over NFS measured ~65 s/step. Larger effective batch via
  # grad-accum keeps VRAM low; ~16 ex/step => ~8h/epoch before first epoch checkpoint.
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  warmup_ratio: 0.03
  weight_decay: 0.01
  # Make a long run observable: checkpoint every ~1h of training (≈55 steps) so the
  # output dir is never empty for 8h, and log loss each step.
  save_strategy: steps
  save_steps: 50
  logging_steps: 1
  # Output (on SSD staging so checkpoints don't land on the CWD/repo)
  output_dir: /media/scott/data/finetune-staging/outputs/checkpoints/toolcall-v5-3b-hermes
  hub_model_id: ""   # set to push to HF Hub
  push_to_hub: false

# ── Paths ───────────────────────────────────────────────────────────────────
paths:
  raw_dir: /media/scott/SSD_4TB/finetune-staging/data/raw
  cleaned_dir: /media/scott/SSD_4TB/finetune-staging/data/cleaned
  dataset_dir: /media/scott/SSD_4TB/finetune-staging/data/datasets